- defaultTab: nodes
  description: ''
  executionEnabled: true
  id: e4d5fe02-df1e-4218-bc9a-450d186695fe
  loglevel: INFO
  name: pywinrm
  nodeFilterEditable: false
  nodefilters:
    dispatch:
      excludePrecedence: true
      keepgoing: false
      rankOrder: ascending
      successOnEmptyNodeFilter: false
      threadcount: '1'
    filter: 'name: winser '
  nodesSelectedByDefault: true
  plugins:
    ExecutionLifecycle: {}
  runnerSelector:
    filter: LINSER
    runnerFilterMode: TAGS
    runnerFilterType: TAG_FILTER_AND
  scheduleEnabled: true
  schedules: []
  sequence:
    commands:
    - fileExtension: .ps1
      interpreterArgsQuoted: false
      script: |-
        $hostname = $env:COMPUTERNAME
        $os = (Get-WmiObject Win32_OperatingSystem).Caption
        $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.InterfaceAlias -notmatch "Loopback"}).IPAddress
        $uptime = (Get-Date) - (gcim Win32_OperatingSystem).LastBootUpTime

        Write-Output "Hostname: $hostname"
        Write-Output "OS: $os"
        Write-Output "IP: $ip"
        Write-Output "Uptime: $($uptime.Days) days, $($uptime.Hours) hours"
      scriptInterpreter: powershell.exe
    keepgoing: false
    pluginConfig:
      WorkflowStrategy:
        node-first:
          info: |-
            <table>
                <tr><td>1.</td><td class="text-info">NodeA</td> <td>step 1</td></tr>
                <tr><td>2.</td><td class="text-info">"</td> <td>step 2</td></tr>
                <tr><td>3.</td><td class="text-info">"</td> <td>step 3</td></tr>
                <tr><td>4.</td><td class="text-muted">NodeB</td> <td>step 1</td></tr>
                <tr><td>5.</td><td class="text-muted">"</td> <td>step 2</td></tr>
                <tr><td>6.</td><td class="text-muted">"</td> <td>step 3</td></tr>
            </table>
    strategy: node-first
  user: mauricio
  uuid: e4d5fe02-df1e-4218-bc9a-450d186695fe

